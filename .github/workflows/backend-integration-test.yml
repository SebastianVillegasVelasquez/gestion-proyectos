name: backend-integration-test.yml
on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-integration-test.yml" # Corregido: Ruta típica de los workflows
    branches: [ develop ]
  pull_request:
    paths:
      - "backend/**"
    branches: [ develop ]

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    services:
      db_test:
        image: postgres:17-alpine
        ports:
          - "5433:5432"
        env:
          POSTGRES_USER: ${{ secrets.DATABASE_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DATABASE_NAME }}
        options: --tmpfs /var/lib/postgresql/data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
            backend/.venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install Poetry
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Setup Poetry config
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Install backend dependencies
        run: poetry install

      - name: Run backend integration tests
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALGORITHM: ${{ secrets.ALGORITHM }}
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
          REFRESH_TOKEN_EXPIRE_DAYS: 30
          DATABASE_URL: postgresql+asyncpg://${{ secrets.DATABASE_USER }}:${{ secrets.DATABASE_PASSWORD }}@localhost:5433/${{ secrets.DATABASE_NAME }}
        run: poetry run pytest tests/integration
