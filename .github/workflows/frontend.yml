run-name: Frontend CI

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
    branches: [develop]
  pull_request:
    paths:
      - "frontend/**"
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js 14.x
        uses: actions/setup-node@v5
        with:
          node-version: 14.x
      - run: npm ci
      - run: npm run build --if-present
